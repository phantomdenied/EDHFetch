<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDHFetch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 1.6rem;
    color: #c89b3c;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 700px) {
    body { padding: 14px; }
    h1 { font-size: 1.25rem; margin-bottom: 16px; }
    .layout { grid-template-columns: 1fr; }
    .cards-img-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: #16213e;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid #2a2a4a;
  }

  .sidebar h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 12px;
  }

  .input-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #666;
    margin-bottom: 4px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .ac-input {
    width: 100%;
    padding: 9px 12px;
    background: #0f3460;
    border: 1px solid #2a4a7a;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .ac-input:focus { border-color: #c89b3c; }

  .partner-wrap { margin-bottom: 14px; }

  .partner-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .partner-divider span {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #555;
    white-space: nowrap;
  }

  .partner-divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid #2a2a4a;
  }

  .ac-list {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #0f3460;
    border: 1px solid #2a4a7a;
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    display: none;
  }

  .ac-list .ac-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: background 0.15s;
  }

  .ac-list .ac-item:hover,
  .ac-list .ac-item.active { background: #1a4a8a; }

  .btn-add {
    width: 100%;
    padding: 9px;
    background: #c89b3c;
    color: #1a1a2e;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 16px;
  }

  .btn-add:hover { background: #e0b34e; }
  .btn-add:disabled { background: #555; color: #888; cursor: default; }

  #commander-list { display: flex; flex-direction: column; gap: 6px; }

  .commander-tag {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: #0f3460;
    border: 1px solid #2a4a7a;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.88rem;
    gap: 8px;
  }

  .commander-tag-names { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .commander-tag-names .primary { color: #e0e0e0; }
  .commander-tag-names .partner { color: #888; font-size: 0.78rem; }
  .commander-tag-names .partner::before { content: '+ '; }

  .commander-tag button {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 0 0 0;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  .commander-tag button:hover { color: #e05555; }

  .btn-fetch-all {
    margin-top: 16px;
    width: 100%;
    padding: 10px;
    background: #1e6b4a;
    color: #b8f0d0;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-fetch-all:hover { background: #258a5e; }
  .btn-fetch-all:disabled { background: #2a3a2a; color: #555; cursor: default; }

  .empty-hint {
    color: #555;
    font-size: 0.82rem;
    text-align: center;
    margin-top: 8px;
  }

  /* ── View Toggle ── */
  .view-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .view-toggle span {
    font-size: 0.8rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toggle-track {
    position: relative;
    width: 52px;
    height: 26px;
    background: #0f3460;
    border-radius: 13px;
    border: 1px solid #2a4a7a;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }

  .toggle-track.active { background: #1a4a8a; border-color: #c89b3c; }

  .toggle-knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #888;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle-track.active .toggle-knob {
    transform: translateX(26px);
    background: #c89b3c;
  }

  /* ── Results ── */
  .results { display: flex; flex-direction: column; gap: 20px; }

  .result-block {
    background: #16213e;
    border-radius: 10px;
    border: 1px solid #2a2a4a;
    overflow: hidden;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #0f3460;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }

  .result-header-titles { flex: 1; }

  .result-header h3 {
    font-size: 1rem;
    color: #c89b3c;
    line-height: 1.3;
  }

  .result-header .partner-sub {
    font-size: 0.75rem;
    color: #888;
    margin-top: 1px;
  }

  .result-header .partner-sub::before { content: '+ '; }

  .result-header .meta { font-size: 0.78rem; color: #888; white-space: nowrap; }

  .result-header .chevron {
    color: #888;
    transition: transform 0.2s;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .result-header.collapsed .chevron { transform: rotate(-90deg); }

  /* ── List view ── */
  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: #0d1a2e;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 16px;
    background: #16213e;
    text-decoration: none;
    transition: background 0.15s;
  }

  .card-row:hover { background: #1a2e50; }

  .card-row .card-name {
    flex: 1;
    color: #e0e0e0;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .card-row:hover .card-name { color: #c89b3c; }
  .card-row .card-stats { display: flex; gap: 20px; }

  /* ── Image tile view ── */
  .cards-img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 14px 16px;
  }

  .card-img-tile {
    display: block;
    text-decoration: none;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    background: #0f3460;
  }

  .card-img-tile:hover {
    border-color: #c89b3c;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }

  .card-img-tile img {
    width: 100%;
    display: block;
    border-radius: 6px 6px 0 0;
    background: #0a1a30;
    min-height: 120px;
  }

  .card-img-info { padding: 7px 9px; }

  .card-img-info .card-name {
    color: #e0e0e0;
    font-size: 0.78rem;
    font-weight: 600;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-img-tile:hover .card-name { color: #c89b3c; }

  .card-stats { display: flex; gap: 8px; font-size: 0.75rem; color: #888; }

  .stat { display: flex; flex-direction: column; }
  .stat .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { color: #aaa; }
  .stat .value.pos { color: #5dba7d; }
  .stat .value.neg { color: #e05555; }

  .status-msg { padding: 14px 16px; font-size: 0.85rem; color: #888; }
  .status-msg.error { color: #e05555; }

  #placeholder { color: #444; font-size: 0.9rem; text-align: center; margin-top: 60px; }
</style>
</head>
<body>

<h1>⚔ EDHFetch</h1>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>My Commanders</h2>

    <div class="input-label">Commander</div>
    <div class="input-wrap" id="primary-wrap">
      <input class="ac-input" id="primary-input" type="text" placeholder="Search commander name…" autocomplete="off" />
      <div class="ac-list" id="primary-ac"></div>
    </div>

    <div class="partner-wrap">
      <div class="partner-divider">
        <span>Partner / Background</span><hr>
      </div>
      <div class="input-wrap" id="partner-wrap">
        <input class="ac-input" id="partner-input" type="text" placeholder="Optional…" autocomplete="off" />
        <div class="ac-list" id="partner-ac"></div>
      </div>
    </div>

    <button class="btn-add" id="btn-add" disabled>+ Add Commander</button>

    <div id="commander-list"></div>

    <button class="btn-fetch-all" id="btn-fetch" disabled>Fetch New Cards</button>
    <p class="empty-hint" id="empty-hint">Add commanders above to get started.</p>
  </div>

  <!-- Results -->
  <div>
    <div class="view-toggle" id="view-toggle" style="display:none">
      <span>List</span>
      <div class="toggle-track" id="toggle-track"><div class="toggle-knob"></div></div>
      <span>Card Art</span>
    </div>

    <div class="results" id="results">
      <div id="placeholder">Add commanders and click "Fetch New Cards".</div>
    </div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'edhrec_commanders_v2';
  const VIEW_KEY    = 'edhrec_view';

  // Each entry: { primary, partner|null, slug, display }
  let commanders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let viewMode   = localStorage.getItem(VIEW_KEY) || 'list';
  let lastCards  = {}; // slug → cardviews

  // Migrate old plain-string format
  commanders = commanders.map(c =>
    typeof c === 'string' ? { primary: c, partner: null, slug: toSlug(c), display: c } : c
  );

  // ── Slugify ───────────────────────────────────────────────────────────────
  function toSlug(name) {
    return name.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '-');
  }

  function buildSlug(primary, partner) {
    return partner ? `${toSlug(primary)}-${toSlug(partner)}` : toSlug(primary);
  }

  function buildDisplay(primary, partner) {
    return partner ? `${primary} + ${partner}` : primary;
  }

  // ── Persist ───────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(commanders));
  }

  // ── Scryfall image ────────────────────────────────────────────────────────
  function scryfallImgUrl(name) {
    return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────
  const toggleTrack = document.getElementById('toggle-track');

  function syncToggleUI() {
    toggleTrack.classList.toggle('active', viewMode === 'art');
  }

  toggleTrack.addEventListener('click', () => {
    viewMode = viewMode === 'list' ? 'art' : 'list';
    localStorage.setItem(VIEW_KEY, viewMode);
    syncToggleUI();
    reRenderAll();
  });

  syncToggleUI();

  // ── Autocomplete factory ──────────────────────────────────────────────────
  function makeAC(inputEl, acListEl, onSelect) {
    let selected = '';
    let index    = -1;
    let timer;

    inputEl.addEventListener('input', () => {
      selected = '';
      onSelect('');
      clearTimeout(timer);
      const q = inputEl.value.trim();
      if (q.length < 2) { acListEl.style.display = 'none'; return; }
      timer = setTimeout(() => fetchSuggestions(q), 200);
    });

    async function fetchSuggestions(q) {
      try {
        const res  = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(q)}&include_extras=false`);
        const data = await res.json();
        showSuggestions(data.data || []);
      } catch { acListEl.style.display = 'none'; }
    }

    function showSuggestions(names) {
      acListEl.innerHTML = '';
      index = -1;
      if (!names.length) { acListEl.style.display = 'none'; return; }
      names.forEach(name => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.textContent = name;
        item.addEventListener('mousedown', e => { e.preventDefault(); pick(name); });
        acListEl.appendChild(item);
      });
      acListEl.style.display = 'block';
    }

    function pick(name) {
      inputEl.value = name;
      selected = name;
      acListEl.style.display = 'none';
      onSelect(name);
    }

    inputEl.addEventListener('keydown', e => {
      const items = acListEl.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        index = Math.min(index + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === index));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        index = Math.max(index - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === index));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (index >= 0 && items[index]) pick(items[index].textContent);
      } else if (e.key === 'Escape') {
        acListEl.style.display = 'none';
      }
    });

    inputEl.addEventListener('change', () => {
      if (inputEl.value.trim() && !selected) {
        selected = inputEl.value.trim();
        onSelect(selected);
      }
    });

    return {
      getValue: () => selected || inputEl.value.trim(),
      clear:    () => { inputEl.value = ''; selected = ''; acListEl.style.display = 'none'; onSelect(''); }
    };
  }

  // ── Wire up autocompletes ─────────────────────────────────────────────────
  let primaryVal = '';
  let partnerVal = '';

  const primaryAC = makeAC(
    document.getElementById('primary-input'),
    document.getElementById('primary-ac'),
    v => { primaryVal = v; updateAddBtn(); }
  );

  const partnerAC = makeAC(
    document.getElementById('partner-input'),
    document.getElementById('partner-ac'),
    v => { partnerVal = v; }
  );

  function updateAddBtn() {
    document.getElementById('btn-add').disabled = !primaryVal;
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#primary-wrap')) document.getElementById('primary-ac').style.display = 'none';
    if (!e.target.closest('#partner-wrap')) document.getElementById('partner-ac').style.display = 'none';
  });

  // ── Add commander ─────────────────────────────────────────────────────────
  function addCommander() {
    const primary = primaryAC.getValue();
    const partner = partnerAC.getValue() || null;
    if (!primary) return;

    const slug = buildSlug(primary, partner);
    if (commanders.some(c => c.slug === slug)) return;

    commanders.push({ primary, partner, slug, display: buildDisplay(primary, partner) });
    save();
    renderSidebar();
    primaryAC.clear();
    partnerAC.clear();
    primaryVal = '';
    partnerVal = '';
    updateAddBtn();
  }

  document.getElementById('btn-add').addEventListener('click', addCommander);

  // ── Render sidebar list ───────────────────────────────────────────────────
  function renderSidebar() {
    const list     = document.getElementById('commander-list');
    const fetchBtn = document.getElementById('btn-fetch');
    const hint     = document.getElementById('empty-hint');

    list.innerHTML = '';
    commanders.forEach((cmd, i) => {
      const tag = document.createElement('div');
      tag.className = 'commander-tag';
      tag.innerHTML = `
        <div class="commander-tag-names">
          <span class="primary">${cmd.primary}</span>
          ${cmd.partner ? `<span class="partner">${cmd.partner}</span>` : ''}
        </div>
        <button title="Remove">✕</button>`;
      tag.querySelector('button').addEventListener('click', () => {
        commanders.splice(i, 1);
        save();
        renderSidebar();
      });
      list.appendChild(tag);
    });

    fetchBtn.disabled = commanders.length === 0;
    hint.style.display = commanders.length === 0 ? 'block' : 'none';
  }

  // ── Stat HTML ─────────────────────────────────────────────────────────────
  function statHtml(card) {
    const raw = card.synergy;
    const synergy = raw != null
      ? (raw > 0 ? `+${(raw * 100).toFixed(0)}%` : `${(raw * 100).toFixed(0)}%`)
      : '—';
    const cls       = raw > 0 ? 'pos' : raw < 0 ? 'neg' : '';
    const inclusion = card.inclusion != null ? `${card.inclusion}%` : '—';
    return `<div class="card-stats">
      <div class="stat"><span class="label">Synergy</span><span class="value ${cls}">${synergy}</span></div>
      <div class="stat"><span class="label">Inclusion</span><span class="value">${inclusion}</span></div>
    </div>`;
  }

  function cardHref(card) {
    return card.url
      ? `https://edhrec.com${card.url}`
      : `https://edhrec.com/cards/${card.sanitized || toSlug(card.name)}`;
  }

  // ── Render cards ──────────────────────────────────────────────────────────
  function renderCards(cards) {
    if (viewMode === 'art') {
      const grid = document.createElement('div');
      grid.className = 'cards-img-grid';
      cards.forEach(card => {
        const tile = document.createElement('a');
        tile.className = 'card-img-tile';
        tile.href = cardHref(card);
        tile.target = '_blank';
        tile.rel = 'noopener';
        tile.innerHTML = `
          <img src="${scryfallImgUrl(card.name)}" alt="${card.name}" loading="lazy" />
          <div class="card-img-info"><span class="card-name">${card.name}</span>${statHtml(card)}</div>`;
        grid.appendChild(tile);
      });
      return grid;
    } else {
      const list = document.createElement('div');
      list.className = 'cards-list';
      cards.forEach(card => {
        const row = document.createElement('a');
        row.className = 'card-row';
        row.href = cardHref(card);
        row.target = '_blank';
        row.rel = 'noopener';
        row.innerHTML = `<span class="card-name">${card.name}</span>${statHtml(card)}`;
        list.appendChild(row);
      });
      return list;
    }
  }

  function reRenderAll() {
    document.getElementById('results').querySelectorAll('.result-block').forEach(block => {
      const slug  = block.dataset.slug;
      const cards = lastCards[slug];
      if (!cards) return;
      const existing = block.querySelector('.cards-list, .cards-img-grid');
      if (!existing) return;
      const collapsed = block.querySelector('.result-header')?.classList.contains('collapsed');
      const newEl = renderCards(cards);
      if (collapsed) newEl.style.display = 'none';
      block.replaceChild(newEl, existing);
    });
  }

  // ── Fetch all ─────────────────────────────────────────────────────────────
  document.getElementById('btn-fetch').addEventListener('click', fetchAll);

  async function fetchAll() {
    const results = document.getElementById('results');
    results.innerHTML = '';
    lastCards = {};
    document.getElementById('view-toggle').style.display = 'flex';

    for (const cmd of commanders) {
      const block = createBlock(cmd);
      results.appendChild(block);
      await fetchCommander(cmd, block);
    }
  }

  function createBlock(cmd) {
    const block = document.createElement('div');
    block.className = 'result-block';
    block.dataset.slug = cmd.slug;
    block.innerHTML = `
      <div class="result-header">
        <div class="result-header-titles">
          <h3>${cmd.primary}</h3>
          ${cmd.partner ? `<div class="partner-sub">${cmd.partner}</div>` : ''}
        </div>
        <span class="meta">Loading…</span>
        <span class="chevron">▾</span>
      </div>
      <div class="status-msg">Fetching from EDHRec…</div>`;

    block.querySelector('.result-header').addEventListener('click', () => {
      const header = block.querySelector('.result-header');
      const body   = block.querySelector('.cards-list, .cards-img-grid, .status-msg');
      if (!body) return;
      const collapsed = header.classList.toggle('collapsed');
      body.style.display = collapsed ? 'none' : '';
    });

    return block;
  }

  async function fetchCommander(cmd, block) {
    const metaEl = block.querySelector('.result-header .meta');
    const body   = block.querySelector('.status-msg');

    try {
      const res = await fetch(`https://json.edhrec.com/pages/commanders/${cmd.slug}.json`);
      if (!res.ok) throw new Error(`EDHRec returned ${res.status}`);

      const data      = await res.json();
      const cardlists = data?.container?.json_dict?.cardlists || [];
      const newSection = cardlists.find(cl =>
        cl.tag === 'newcards' || (cl.header || '').toLowerCase().includes('new')
      );

      if (!newSection?.cardviews?.length) {
        body.textContent  = 'No "New Cards" section found for this commander.';
        metaEl.textContent = 'No new cards';
        return;
      }

      const cards = newSection.cardviews;
      lastCards[cmd.slug] = cards;
      metaEl.textContent = `${cards.length} new card${cards.length !== 1 ? 's' : ''}`;
      block.replaceChild(renderCards(cards), body);

    } catch (err) {
      body.classList.add('error');
      body.textContent   = `Error: ${err.message}`;
      metaEl.textContent = 'Failed';
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  renderSidebar();
</script>
</body>
</html>
