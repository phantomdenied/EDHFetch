<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDHFetch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #08080f;
    --surface:     #0e0e1c;
    --panel:       #131325;
    --panel-hover: #191930;
    --border:      #1e1e3a;
    --border-lit:  #2e2e5a;
    --gold:        #c9a84c;
    --gold-light:  #e8c96e;
    --gold-dim:    #7a6030;
    --purple:      #6b4fa0;
    --purple-glow: rgba(107, 79, 160, 0.25);
    --green:       #3db87a;
    --red:         #d94f4f;
    --text:        #ddd8cc;
    --text-dim:    #7a7590;
    --text-faint:  #3a3555;
    --shadow:      0 4px 24px rgba(0,0,0,0.6);
    --radius:      10px;
    --radius-sm:   6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(107,79,160,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 100%, rgba(201,168,76,0.07) 0%, transparent 60%);
  }

  /* ── Header ── */
  .site-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 28px 28px 0;
    margin-bottom: 28px;
  }

  .site-header .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    box-shadow: 0 0 16px rgba(201,168,76,0.3);
    flex-shrink: 0;
  }

  .site-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--gold-light), var(--gold), #a07830);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .site-header .tagline {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 290px 1fr;
    gap: 20px;
    padding: 0 28px 40px;
    align-items: start;
  }

  @media (max-width: 720px) {
    .site-header { padding: 18px 18px 0; }
    .layout { grid-template-columns: 1fr; padding: 0 18px 32px; }
    .cards-img-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .sidebar-header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--panel) 0%, var(--surface) 100%);
  }

  .sidebar-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .sidebar-body { padding: 16px 18px; }

  .field-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .input-wrap { position: relative; margin-bottom: 12px; }

  .ac-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border-lit);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .ac-input::placeholder { color: var(--text-faint); }

  .ac-input:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .ac-list {
    position: absolute;
    top: calc(100% + 2px);
    left: 0; right: 0;
    background: var(--panel);
    border: 1px solid var(--border-lit);
    border-radius: var(--radius-sm);
    max-height: 200px;
    overflow-y: auto;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }

  .ac-list .ac-item {
    padding: 9px 14px;
    cursor: pointer;
    font-size: 0.86rem;
    color: var(--text);
    transition: background 0.12s, color 0.12s;
    border-bottom: 1px solid var(--border);
  }

  .ac-list .ac-item:last-child { border-bottom: none; }

  .ac-list .ac-item:hover,
  .ac-list .ac-item.active {
    background: var(--panel-hover);
    color: var(--gold-light);
  }

  .partner-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0 10px;
  }

  .partner-divider span {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--purple);
    white-space: nowrap;
  }

  .partner-divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--border);
  }

  .btn-add {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #8a6520, var(--gold));
    color: #0a0806;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s;
    margin-bottom: 18px;
    box-shadow: 0 2px 12px rgba(201,168,76,0.2);
  }

  .btn-add:hover:not(:disabled) {
    opacity: 0.9;
    box-shadow: 0 4px 18px rgba(201,168,76,0.35);
  }

  .btn-add:disabled {
    background: var(--panel);
    color: var(--text-faint);
    box-shadow: none;
    cursor: default;
  }

  /* ── Commander list ── */
  .sidebar-section-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  #commander-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

  .commander-tag {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 10px 9px 12px;
    transition: border-color 0.15s;
  }

  .commander-tag:hover { border-color: var(--border-lit); }

  .commander-tag-names { flex: 1; display: flex; flex-direction: column; gap: 2px; }

  .commander-tag-names .primary {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  .commander-tag-names .partner {
    font-size: 0.74rem;
    color: var(--purple);
    opacity: 0.85;
  }

  .commander-tag-names .partner::before { content: '⟡ '; font-size: 0.65rem; }

  .commander-tag .remove-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
    padding: 2px 2px 0;
    flex-shrink: 0;
    transition: color 0.15s;
    border-radius: 3px;
  }

  .commander-tag .remove-btn:hover { color: var(--red); }

  .btn-fetch-all {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #0d3d28, #1a6b48);
    color: #7eedb8;
    border: 1px solid #1a4a30;
    border-radius: var(--radius-sm);
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(30,100,70,0.2);
  }

  .btn-fetch-all:hover:not(:disabled) {
    opacity: 0.9;
    box-shadow: 0 4px 18px rgba(30,100,70,0.35);
  }

  .btn-fetch-all:disabled {
    background: var(--panel);
    color: var(--text-faint);
    border-color: var(--border);
    box-shadow: none;
    cursor: default;
  }

  .empty-hint {
    text-align: center;
    color: var(--text-faint);
    font-size: 0.78rem;
    margin-top: 10px;
    line-height: 1.6;
  }

  /* ── Results area ── */
  .results-area { display: flex; flex-direction: column; gap: 0; }

  /* ── View toggle bar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }

  .toolbar-right { display: flex; align-items: center; gap: 8px; }

  .view-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-lit);
    background: var(--panel);
    color: var(--text-dim);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--panel-hover);
    border-color: var(--gold-dim);
    color: var(--gold-light);
    box-shadow: 0 0 10px rgba(201,168,76,0.1);
  }

  .view-btn:hover:not(.active) { border-color: var(--border-lit); color: var(--text); }

  /* ── Results ── */
  .results { display: flex; flex-direction: column; gap: 14px; }

  .result-block {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .result-block:hover { border-color: var(--border-lit); }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--panel) 0%, rgba(30,20,60,0.6) 100%);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .result-header:hover { background: linear-gradient(135deg, var(--panel-hover) 0%, rgba(40,25,75,0.7) 100%); }

  .result-header-titles { flex: 1; }

  .result-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }

  .result-header .partner-sub {
    font-size: 0.73rem;
    color: var(--purple);
    margin-top: 2px;
    opacity: 0.9;
  }

  .result-header .partner-sub::before { content: '⟡ '; font-size: 0.62rem; }

  .result-header .badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 12px;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .result-header .badge.loading { background: rgba(100,100,160,0.1); border-color: var(--border-lit); color: var(--text-dim); }
  .result-header .badge.error   { background: rgba(200,70,70,0.1);   border-color: #6a2020;          color: var(--red); }

  .chevron {
    color: var(--text-dim);
    font-size: 0.75rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .result-header.collapsed .chevron { transform: rotate(-90deg); }

  /* ── Checkbox left-strip ── */
  .check-wrap {
    display: none;
    align-self: stretch;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    flex-shrink: 0;
    cursor: pointer;
    margin: -14px 0 -14px -18px;
    padding: 14px;
    border-right: 2px solid transparent;
    transition: background 0.12s, border-color 0.12s;
  }

  .check-wrap:hover { background: rgba(107,79,160,0.12); }

  .check-wrap input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--purple);
    cursor: pointer;
    pointer-events: none;
    flex-shrink: 0;
  }

  .result-block.selected { border-color: var(--purple); }
  .result-block.selected .check-wrap { border-right-color: var(--purple); background: rgba(107,79,160,0.1); }

  /* ── Copy footer (inside expanded card list) ── */
  .copy-list-footer {
    display: flex;
    justify-content: flex-end;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
  }

  .copy-list-footer-btn {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 12px;
    background: rgba(100,80,200,0.12);
    border: 1px solid var(--border-lit);
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .copy-list-footer-btn:hover { background: rgba(100,80,200,0.25); color: var(--text); border-color: var(--purple); }
  .copy-list-footer-btn.copied { background: rgba(60,180,100,0.15); color: #5dba7a; border-color: #2d6644; }

  /* ── Toolbar copy-selected ── */
  .copy-selected-btn {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(100,80,200,0.12);
    border: 1px solid var(--border-lit);
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.3px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .copy-selected-btn:hover { background: rgba(100,80,200,0.25); color: var(--text); border-color: var(--purple); }
  .copy-selected-btn.copied { background: rgba(60,180,100,0.15); color: #5dba7a; border-color: #2d6644; }

  /* ── List view ── */
  .cards-list { display: flex; flex-direction: column; }

  .card-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 11px 18px;
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  .card-row:last-child { border-bottom: none; }
  .card-row:hover { background: var(--panel-hover); }

  .card-row .card-name {
    flex: 1;
    font-size: 0.87rem;
    font-weight: 500;
    color: var(--text);
    transition: color 0.12s;
  }

  .card-row:hover .card-name { color: var(--gold-light); }

  .card-row .card-stats { display: flex; gap: 24px; }

  /* ── Image tile view ── */
  .cards-img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 14px;
    padding: 16px 18px;
  }

  .card-img-tile {
    display: block;
    text-decoration: none;
    border-radius: 9px;
    overflow: hidden;
    border: 2px solid var(--border);
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    background: var(--panel);
  }

  .card-img-tile:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.12);
  }

  .card-img-tile img {
    width: 100%;
    display: block;
    background: var(--panel);
    min-height: 110px;
  }

  .card-img-info { padding: 9px 11px 10px; }

  .card-img-info .card-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
    transition: color 0.12s;
  }

  .card-img-tile:hover .card-name { color: var(--gold-light); }

  /* ── Shared stat pill ── */
  .card-stats { display: flex; gap: 10px; }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-faint);
  }

  .stat .value       { font-size: 0.78rem; font-weight: 600; color: var(--text-dim); }
  .stat .value.pos   { color: var(--green); }
  .stat .value.neg   { color: var(--red); }

  /* ── Status / loading ── */
  .status-msg {
    padding: 20px 18px;
    font-size: 0.84rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-msg::before {
    content: '';
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border-lit);
    border-top-color: var(--gold-dim);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .status-msg.error { color: var(--red); }
  .status-msg.error::before { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  #placeholder {
    color: var(--text-faint);
    font-size: 0.88rem;
    text-align: center;
    padding: 60px 20px;
    line-height: 1.8;
  }

  #placeholder strong { display: block; font-family: 'Cinzel', serif; font-size: 1rem; color: var(--text-dim); margin-bottom: 6px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 3px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-icon">⚔</div>
  <div>
    <h1>EDHFetch</h1>
    <div class="tagline">New Card Tracker for EDH Commanders</div>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>My Commanders</h2>
    </div>

    <div class="sidebar-body">
      <div class="field-label">Commander</div>
      <div class="input-wrap" id="primary-wrap">
        <input class="ac-input" id="primary-input" type="text" placeholder="Search by name…" autocomplete="off" />
        <div class="ac-list" id="primary-ac"></div>
      </div>

      <div class="partner-divider">
        <span>Partner / Background</span><hr>
      </div>
      <div class="input-wrap" id="partner-wrap">
        <input class="ac-input" id="partner-input" type="text" placeholder="Optional…" autocomplete="off" />
        <div class="ac-list" id="partner-ac"></div>
      </div>

      <button class="btn-add" id="btn-add" disabled>+ Add to Roster</button>

      <div class="sidebar-section-label" id="roster-label" style="display:none">Roster</div>
      <div id="commander-list"></div>

      <button class="btn-fetch-all" id="btn-fetch" disabled>✦ Fetch New Cards</button>
      <p class="empty-hint" id="empty-hint">Add a commander above<br>to get started.</p>
    </div>
  </div>

  <!-- ── Results ── -->
  <div class="results-area">
    <div class="toolbar" id="toolbar" style="display:none">
      <button class="copy-selected-btn" id="btn-copy-selected" title="Copy combined list of checked commanders for TCGplayer">Copy Selected</button>
      <div class="toolbar-right">
        <button class="view-btn active" id="btn-list">☰ List</button>
        <button class="view-btn" id="btn-art">⊞ Card Art</button>
      </div>
    </div>

    <div class="results" id="results">
      <div id="placeholder">
        <strong>No commanders yet</strong>
        Search for your commanders in the sidebar and click "Fetch New Cards" to see what's new.
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'edhrec_commanders_v2';
  const VIEW_KEY    = 'edhrec_view';

  let commanders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let viewMode   = localStorage.getItem(VIEW_KEY) || 'list';
  let lastCards  = {};

  commanders = commanders.map(c =>
    typeof c === 'string'
      ? { primary: c, partner: null, slug: toSlug(c), display: c }
      : { ...c, slug: buildSlug(c.primary, c.partner) }
  );

  // ── Slugify ───────────────────────────────────────────────────────────────
  function toSlug(name) {
    return name.toLowerCase().replace(/-/g, ' ').replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '-');
  }

  function buildSlug(primary, partner) {
    return partner ? `${toSlug(primary)}-${toSlug(partner)}` : toSlug(primary);
  }

  function buildDisplay(primary, partner) {
    return partner ? `${primary} + ${partner}` : primary;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(commanders));
  }

  function scryfallImgUrl(name) {
    return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────
  document.getElementById('btn-list').addEventListener('click', () => setView('list'));
  document.getElementById('btn-art').addEventListener('click',  () => setView('art'));

  const copySelectedBtn = document.getElementById('btn-copy-selected');
  copySelectedBtn.addEventListener('click', () => {
    const checked = [...document.querySelectorAll('.block-check:checked')];
    if (!checked.length) { copySelectedBtn.textContent = 'None checked!'; setTimeout(() => { copySelectedBtn.textContent = 'Copy Selected'; }, 1500); return; }
    const seen = new Set();
    const lines = [];
    checked.forEach(cb => {
      const slug = cb.closest('.result-block').dataset.slug;
      (lastCards[slug] || []).forEach(c => { if (!seen.has(c.name)) { seen.add(c.name); lines.push(`1 ${c.name}`); } });
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      copySelectedBtn.textContent = `Copied ${lines.length} cards!`;
      copySelectedBtn.classList.add('copied');
      setTimeout(() => { copySelectedBtn.textContent = 'Copy Selected'; copySelectedBtn.classList.remove('copied'); }, 2000);
    });
  });

  function setView(mode) {
    viewMode = mode;
    localStorage.setItem(VIEW_KEY, mode);
    document.getElementById('btn-list').classList.toggle('active', mode === 'list');
    document.getElementById('btn-art').classList.toggle('active',  mode === 'art');
    reRenderAll();
  }

  setView(viewMode);

  // ── Autocomplete factory ──────────────────────────────────────────────────
  function makeAC(inputEl, acListEl, onSelect) {
    let selected = '';
    let index    = -1;
    let timer;

    inputEl.addEventListener('input', () => {
      selected = ''; onSelect('');
      clearTimeout(timer);
      const q = inputEl.value.trim();
      if (q.length < 2) { acListEl.style.display = 'none'; return; }
      timer = setTimeout(() => load(q), 200);
    });

    async function load(q) {
      try {
        const res  = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(q)}&include_extras=false`);
        const data = await res.json();
        render(data.data || []);
      } catch { acListEl.style.display = 'none'; }
    }

    function render(names) {
      acListEl.innerHTML = ''; index = -1;
      if (!names.length) { acListEl.style.display = 'none'; return; }
      names.forEach(name => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.textContent = name;
        item.addEventListener('mousedown', e => { e.preventDefault(); pick(name); });
        acListEl.appendChild(item);
      });
      acListEl.style.display = 'block';
    }

    function pick(name) {
      inputEl.value = name; selected = name;
      acListEl.style.display = 'none';
      onSelect(name);
    }

    inputEl.addEventListener('keydown', e => {
      const items = acListEl.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault(); index = Math.min(index + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === index));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault(); index = Math.max(index - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === index));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (index >= 0 && items[index]) pick(items[index].textContent);
      } else if (e.key === 'Escape') {
        acListEl.style.display = 'none';
      }
    });

    inputEl.addEventListener('change', () => {
      if (inputEl.value.trim() && !selected) { selected = inputEl.value.trim(); onSelect(selected); }
    });

    return {
      getValue: () => selected || inputEl.value.trim(),
      clear: () => { inputEl.value = ''; selected = ''; acListEl.style.display = 'none'; onSelect(''); }
    };
  }

  // ── Wire autocompletes ────────────────────────────────────────────────────
  let primaryVal = '', partnerVal = '';

  const primaryAC = makeAC(
    document.getElementById('primary-input'),
    document.getElementById('primary-ac'),
    v => { primaryVal = v; updateAddBtn(); }
  );

  const partnerAC = makeAC(
    document.getElementById('partner-input'),
    document.getElementById('partner-ac'),
    v => { partnerVal = v; }
  );

  function updateAddBtn() {
    document.getElementById('btn-add').disabled = !primaryVal;
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#primary-wrap')) document.getElementById('primary-ac').style.display = 'none';
    if (!e.target.closest('#partner-wrap')) document.getElementById('partner-ac').style.display = 'none';
  });

  // ── Add commander ─────────────────────────────────────────────────────────
  function addCommander() {
    const primary = primaryAC.getValue();
    const partner = partnerAC.getValue() || null;
    if (!primary) return;
    const slug = buildSlug(primary, partner);
    if (commanders.some(c => c.slug === slug)) return;
    commanders.push({ primary, partner, slug, display: buildDisplay(primary, partner) });
    save(); renderSidebar();
    primaryAC.clear(); partnerAC.clear();
    primaryVal = ''; partnerVal = ''; updateAddBtn();
  }

  document.getElementById('btn-add').addEventListener('click', addCommander);

  // ── Render sidebar ────────────────────────────────────────────────────────
  function renderSidebar() {
    const list  = document.getElementById('commander-list');
    const fetch = document.getElementById('btn-fetch');
    const hint  = document.getElementById('empty-hint');
    const label = document.getElementById('roster-label');

    list.innerHTML = '';
    commanders.forEach((cmd, i) => {
      const tag = document.createElement('div');
      tag.className = 'commander-tag';
      tag.innerHTML = `
        <div class="commander-tag-names">
          <span class="primary">${cmd.primary}</span>
          ${cmd.partner ? `<span class="partner">${cmd.partner}</span>` : ''}
        </div>
        <button class="remove-btn" title="Remove">✕</button>`;
      tag.querySelector('.remove-btn').addEventListener('click', () => {
        commanders.splice(i, 1); save(); renderSidebar();
      });
      list.appendChild(tag);
    });

    const empty = commanders.length === 0;
    fetch.disabled = empty;
    hint.style.display  = empty ? 'block' : 'none';
    label.style.display = empty ? 'none'  : 'block';
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function statHtml(card) {
    const raw       = card.synergy;
    const synergy   = raw != null ? (raw > 0 ? `+${(raw*100).toFixed(0)}%` : `${(raw*100).toFixed(0)}%`) : '—';
    const cls       = raw > 0 ? 'pos' : raw < 0 ? 'neg' : '';
    const inclusion = card.inclusion != null ? `${card.inclusion}%` : '—';
    const price     = card.price != null ? `$${Number(card.price).toFixed(2)}` : '—';
    return `<div class="card-stats">
      <div class="stat"><span class="label">Synergy</span><span class="value ${cls}">${synergy}</span></div>
      <div class="stat"><span class="label">In Decks</span><span class="value">${inclusion}</span></div>
      <div class="stat"><span class="label">Price</span><span class="value">${price}</span></div>
    </div>`;
  }

  async function fetchPrices(cards) {
    try {
      const res = await fetch('https://api.scryfall.com/cards/collection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiers: cards.map(c => ({ name: c.name })) })
      });
      const data = await res.json();
      const map = {};
      (data.data || []).forEach(c => { map[c.name] = c.prices?.usd ?? null; });
      return map;
    } catch { return {}; }
  }

  function cardHref(card) {
    return card.url
      ? `https://edhrec.com${card.url}`
      : `https://edhrec.com/cards/${card.sanitized || toSlug(card.name)}`;
  }

  // ── Render cards ──────────────────────────────────────────────────────────
  function renderCards(cards) {
    if (viewMode === 'art') {
      const grid = document.createElement('div');
      grid.className = 'cards-img-grid';
      cards.forEach(card => {
        const tile = document.createElement('a');
        tile.className = 'card-img-tile';
        tile.href = cardHref(card); tile.target = '_blank'; tile.rel = 'noopener';
        tile.innerHTML = `
          <img src="${scryfallImgUrl(card.name)}" alt="${card.name}" loading="lazy" />
          <div class="card-img-info"><span class="card-name">${card.name}</span>${statHtml(card)}</div>`;
        grid.appendChild(tile);
      });
      return grid;
    } else {
      const list = document.createElement('div');
      list.className = 'cards-list';
      cards.forEach(card => {
        const row = document.createElement('a');
        row.className = 'card-row';
        row.href = cardHref(card); row.target = '_blank'; row.rel = 'noopener';
        row.innerHTML = `<span class="card-name">${card.name}</span>${statHtml(card)}`;
        list.appendChild(row);
      });
      return list;
    }
  }

  function reRenderAll() {
    document.getElementById('results').querySelectorAll('.result-block').forEach(block => {
      const cards = lastCards[block.dataset.slug];
      if (!cards) return;
      const cardsBody = block.querySelector('.cards-body');
      if (!cardsBody) return;
      const existing = cardsBody.querySelector('.cards-list, .cards-img-grid');
      if (!existing) return;
      cardsBody.replaceChild(renderCards(cards), existing);
    });
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-fetch').addEventListener('click', fetchAll);

  async function fetchAll() {
    const results = document.getElementById('results');
    results.innerHTML = ''; lastCards = {};
    document.getElementById('toolbar').style.display = 'flex';
    for (const cmd of commanders) {
      const block = createBlock(cmd);
      results.appendChild(block);
      await fetchCommander(cmd, block);
    }
  }

  function createBlock(cmd) {
    const block = document.createElement('div');
    block.className = 'result-block';
    block.dataset.slug = cmd.slug;
    block.innerHTML = `
      <div class="result-header">
        <label class="check-wrap" title="Include in combined copy">
          <input type="checkbox" class="block-check" />
        </label>
        <div class="result-header-titles">
          <h3>${cmd.primary}</h3>
          ${cmd.partner ? `<div class="partner-sub">${cmd.partner}</div>` : ''}
        </div>
        <span class="badge loading">Loading…</span>
        <span class="chevron">▾</span>
      </div>
      <div class="status-msg">Fetching from EDHRec…</div>`;

    block.querySelector('.block-check').addEventListener('change', e => {
      block.classList.toggle('selected', e.target.checked);
    });

    block.querySelector('.check-wrap').addEventListener('click', e => e.stopPropagation());

    block.querySelector('.result-header').addEventListener('click', () => {
      const header = block.querySelector('.result-header');
      const body   = block.querySelector('.cards-body, .status-msg');
      if (!body) return;
      const collapsed = header.classList.toggle('collapsed');
      body.style.display = collapsed ? 'none' : '';
    });

    // start collapsed
    block.querySelector('.result-header').classList.add('collapsed');

    return block;
  }

  async function fetchCommander(cmd, block) {
    const badge = block.querySelector('.badge');
    const body  = block.querySelector('.status-msg');

    try {
      const res = await fetch(`https://json.edhrec.com/pages/commanders/${cmd.slug}.json`);
      if (!res.ok) throw new Error(`EDHRec returned ${res.status}`);

      const data       = await res.json();
      const cardlists  = data?.container?.json_dict?.cardlists || [];
      const newSection = cardlists.find(cl =>
        cl.tag === 'newcards' || (cl.header || '').toLowerCase().includes('new')
      );

      if (!newSection?.cardviews?.length) {
        body.classList.remove(); body.classList.add('status-msg', 'error');
        body.innerHTML = 'No new cards found for this commander.';
        badge.textContent = 'No new cards'; badge.className = 'badge error';
        return;
      }

      const cards    = newSection.cardviews;
      const priceMap = await fetchPrices(cards);
      cards.forEach(c => { if (priceMap[c.name] != null) c.price = priceMap[c.name]; });
      lastCards[cmd.slug] = cards;
      const total = cards.reduce((sum, c) => sum + (Number(c.price) || 0), 0);
      badge.textContent = `$${total.toFixed(2)}`;
      badge.className = 'badge';
      block.querySelector('.check-wrap').style.display = 'flex';

      const cardEl  = renderCards(cards);
      const footer  = document.createElement('div');
      footer.className = 'copy-list-footer';
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-list-footer-btn';
      copyBtn.textContent = 'Copy List for TCGplayer';
      copyBtn.addEventListener('click', () => {
        const text = cards.map(c => `1 ${c.name}`).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.textContent = 'Copy List for TCGplayer'; copyBtn.classList.remove('copied'); }, 2000);
        });
      });
      footer.appendChild(copyBtn);

      const cardsBody = document.createElement('div');
      cardsBody.className = 'cards-body';
      cardsBody.appendChild(cardEl);
      cardsBody.appendChild(footer);
      cardsBody.style.display = 'none';
      block.replaceChild(cardsBody, body);

    } catch (err) {
      body.classList.add('error');
      body.innerHTML = `Error: ${err.message}`;
      body.querySelector?.('::before')?.remove?.();
      badge.textContent = 'Error'; badge.className = 'badge error';
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  renderSidebar();
</script>
</body>
</html>
